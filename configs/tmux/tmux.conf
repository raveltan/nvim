# ──────────────────────────────────────────────
# Terminal & Display
# ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"           # true color
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # undercurl colors

set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

set -g set-clipboard on
set -g mouse on

# ──────────────────────────────────────────────
# QOL Settings
# ──────────────────────────────────────────────
set -sg escape-time 0              # instant escape (critical for nvim)
set -g focus-events on             # needed for nvim autoread
set -g history-limit 50000         # generous scrollback
set -g display-time 4000           # show messages for 4s
set -g status-interval 3           # refresh status bar every 3s
set -g detach-on-destroy off       # don't exit tmux after closing a session
setw -g aggressive-resize on       # better for multi-monitor setups

# window numbering
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# auto-rename windows to current directory
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# ──────────────────────────────────────────────
# Keybindings
# ──────────────────────────────────────────────
# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# splits (preserve current path)
unbind %
bind '|' split-window -h -c "#{pane_current_path}"
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# new window in current path
bind c new-window -c "#{pane_current_path}"

# resize panes with vim keys
bind -r j resize-pane -D 3
bind -r k resize-pane -U 3
bind -r l resize-pane -R 3
bind -r h resize-pane -L 3
bind -r m resize-pane -Z   # maximize/zoom pane

# quick window switching (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# toggle last window / session
bind Tab last-window

# kill pane without confirmation
bind x kill-pane

# sesh session picker (fzf-tmux popup)
# ^a all  ^t tmux  ^g configs  ^x zoxide  ^d kill session
bind-key "T" run-shell "sesh connect \"\$(
	sesh list --icons | fzf-tmux -p 80%,70% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d kill' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)'
)\""

# jump to previous sesh session
bind-key "L" run-shell "sesh last"

# ──────────────────────────────────────────────
# Vi Copy Mode
# ──────────────────────────────────────────────
setw -g mode-keys vi

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle  # rectangle select
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send -X cancel

# don't exit copy mode on mouse drag
unbind -T copy-mode-vi MouseDragEnd1Pane

# ──────────────────────────────────────────────
# Visual: Pane Borders & Inactive Dimming
# ──────────────────────────────────────────────
set -g pane-border-lines double
set -g pane-border-style 'fg=#44415a'          # rose-pine muted
set -g pane-active-border-style 'fg=#c4a7e7'   # rose-pine iris
set -g popup-border-lines rounded

# dim inactive panes slightly
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'

# ──────────────────────────────────────────────
# Rose Pine Theme
# ──────────────────────────────────────────────
set -g @rose_pine_variant 'moon'

# transparent status bar (works with Kaku transparency)
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# status modules
set -g @rose_pine_directory 'on'
set -g @rose_pine_date_time '%H:%M'
set -g @rose_pine_user 'off'
set -g @rose_pine_host 'off'
set -g @rose_pine_show_current_program 'off'
set -g @rose_pine_show_pane_directory 'off'
set -g @rose_pine_default_window_behavior 'off'
set -g @rose_pine_disable_active_window_menu 'on'   # hide active window name on left

# powerline separators (nerd font)
set -g @rose_pine_left_separator ' '
set -g @rose_pine_right_separator ' '
set -g @rose_pine_field_separator '  '
set -g @rose_pine_window_separator ' : '

# nerd font icons
set -g @rose_pine_session_icon ''
set -g @rose_pine_current_window_icon ''
set -g @rose_pine_folder_icon ''
set -g @rose_pine_date_time_icon '󰃰'

# hide right side when terminal is narrow (disabled — broke on server start before client attach)
set -g @rose_pine_prioritize_windows 'off'

set -g status-right-length 100
set -g status-left-length 100

# ──────────────────────────────────────────────
# Plugins
# ──────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'kristijan/fzf-pane-switch.tmux'
set -g @plugin 'alberti42/tmux-fzf-links'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'

# plugin config
set -g @floax-change-path 'false'

# floax: show status bar (window numbers) inside the float so multiple windows are visible
# floax disables status on its 'scratch' session; re-enable on attach (loses race if set at creation)
set-hook -g client-attached 'if -F "#{==:#{session_name},scratch}" "set -t scratch status on ; set -t scratch status-left \"\" ; set -t scratch status-right \"\""'
set -g @thumbs-command 'echo -n {} | pbcopy'

# tmux-fzf: popup window/session/pane picker
TMUX_FZF_LAUNCH_KEY="f"
TMUX_FZF_OPTIONS="-p -w 80% -h 70% -m"
TMUX_FZF_ORDER="window|session|pane|command|keybinding|clipboard|process"

# direct fuzzy window picker
bind-key w run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/window.sh switch"

# ──────────────────────────────────────────────
# Initialize TPM (must be last)
# ──────────────────────────────────────────────
run '~/.config/tmux/plugins/tpm/tpm'

# override rose-pine: status bar shows window number only (no name)
setw -g window-status-format '#[fg=#908caa] #I '
setw -g window-status-current-format '#[fg=#f6c177,bold] #I '
setw -g window-status-separator ''
